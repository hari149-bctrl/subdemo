<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainy Voyage Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: #f5f5f5;
    }
    
    .mainContainer {
      display: flex;
      height: 100vh;
    }
    
    .leftContainer {
      width: 30%;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
    }
    
    .rightContainer {
      width: 70%;
      display: flex;
      flex-direction: column;
    }
    
    .rightTopContainer {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #ddd;
    }
    
    .rightBottomContainer {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .commentsSection {
      width: 50%;
      padding: 20px;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }
    
    .logsSection {
      width: 50%;
      padding: 20px;
      overflow-y: auto;
      background: #f9f9f9;
    }
    
    .searchBarContainer {
      display: flex;
      margin-bottom: 20px;
    }
    
    .searchBar {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px 0 0 4px;
    }
    
    .searchBtn {
      padding: 10px 15px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }
    
    .sideDetails {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .sideDetails:hover {
      background: #f0f8ff;
    }
    
    .sideDetails.active {
      background: #e1f0fa;
      border-left: 4px solid #3498db;
    }
    
    .sideDetails p {
      margin: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .postInfo {
      margin-bottom: 20px;
    }
    
    .postInfo p {
      margin: 5px 0;
    }
    
    .settingsContainer {
      margin: 20px 0;
    }
    
    .settingGroup {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
    }
    
    .settingLabel {
      width: 150px;
      font-weight: 500;
    }
    
    .settingInput {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-right: 10px;
    }
    
    .settingBtn {
      padding: 8px 15px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .actionBtn {
      padding: 8px 15px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    
    th {
      background-color: #3498db;
      color: white;
    }
    
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    
    tr:hover {
      background-color: #f1f1f1;
    }
    
    .retryBtn {
      padding: 5px 10px;
      background: #f39c12;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    
    .status-sent {
      color: #27ae60;
      font-weight: bold;
    }
    
    .status-failed {
      color: #e74c3c;
      font-weight: bold;
    }
    
    .status-pending {
      color: #f39c12;
      font-weight: bold;
    }
    
    .status-ignored {
      color: #95a5a6;
      font-weight: bold;
    }
    
    .logEntry {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-family: monospace;
    }
    
    .logEntry.info {
      color: #2c3e50;
    }
    
    .logEntry.error {
      color: #e74c3c;
      font-weight: bold;
    }
    
    .logEntry.success {
      color: #27ae60;
    }
    
    .logTimestamp {
      color: #7f8c8d;
      margin-right: 10px;
    }
    
    .logsHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .clearLogsBtn {
      padding: 5px 10px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="mainContainer">
    <div class="leftContainer">
      <div class="searchBarContainer">
        <input type="text" placeholder="Search by caption" class="searchBar" id="searchBar">
        <button class="searchBtn" id="searchBtn">🔍</button>
      </div>
      <div class="sideDetailsContainers" id="postsContainer">
        <!-- Posts will be loaded here -->
      </div>
    </div>
    <div class="rightContainer">
      <div class="rightTopContainer">
        <div class="postInfo">
          <h3>Post Details</h3>
          <p>ID: <span id="postId">-</span></p>
          <p>Caption: <span id="postCaption">-</span></p>
          <p>Timestamp: <span id="postTimestamp">-</span></p>
        </div>
        
        <div class="settingsContainer">
          <h3>Settings</h3>
          <div class="settingGroup">
            <span class="settingLabel">Current Keyword:</span>
            <span class="settingInput" id="currentKeyword">none</span>
          </div>
          <div class="settingGroup">
            <span class="settingLabel">New Keyword:</span>
            <input type="text" class="settingInput" id="keywordInput" placeholder="Enter keyword">
            <button class="settingBtn" id="updateKeywordBtn">Update</button>
          </div>
          
          <div class="settingGroup">
            <span class="settingLabel">Current Message:</span>
            <span class="settingInput" id="currentMessage">none</span>
          </div>
          <div class="settingGroup">
            <span class="settingLabel">New Message:</span>
            <input type="text" class="settingInput" id="messageInput" placeholder="Enter message template">
            <button class="settingBtn" id="updateMessageBtn">Update</button>
          </div>
        </div>
        
        <div>
          <button class="actionBtn" id="refreshCommentsBtn">Refresh Comments</button>
          <button class="actionBtn" id="refreshPostsBtn">Refresh All Posts</button>
        </div>
      </div>
      
      <div class="rightBottomContainer">
        <div class="commentsSection">
          <h3>Comments</h3>
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Comment</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="commentsTable">
              <!-- Comments will be loaded here -->
            </tbody>
          </table>
        </div>
        
        <div class="logsSection">
          <div class="logsHeader">
            <h3>Activity Logs</h3>
            <button class="clearLogsBtn" id="clearLogsBtn">Clear Logs</button>
          </div>
          <div id="logsContainer">
            <!-- Logs will be loaded here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentPostId = null;
    
    // DOM Elements
    const postsContainer = document.getElementById('postsContainer');
    const searchBar = document.getElementById('searchBar');
    const searchBtn = document.getElementById('searchBtn');
    const keywordInput = document.getElementById('keywordInput');
    const messageInput = document.getElementById('messageInput');
    const updateKeywordBtn = document.getElementById('updateKeywordBtn');
    const updateMessageBtn = document.getElementById('updateMessageBtn');
    const currentKeywordSpan = document.getElementById('currentKeyword');
    const currentMessageSpan = document.getElementById('currentMessage');
    const postIdSpan = document.getElementById('postId');
    const postCaptionSpan = document.getElementById('postCaption');
    const postTimestampSpan = document.getElementById('postTimestamp');
    const commentsTable = document.getElementById('commentsTable');
    const refreshCommentsBtn = document.getElementById('refreshCommentsBtn');
    const refreshPostsBtn = document.getElementById('refreshPostsBtn');
    const logsContainer = document.getElementById('logsContainer');
    const clearLogsBtn = document.getElementById('clearLogsBtn');
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      fetchPosts();
      fetchLogs();
      
      // Set up event listeners
      searchBtn.addEventListener('click', searchPosts);
      updateKeywordBtn.addEventListener('click', updateSettings);
      updateMessageBtn.addEventListener('click', updateSettings);
      refreshCommentsBtn.addEventListener('click', refreshComments);
      refreshPostsBtn.addEventListener('click', refreshAllPosts);
      clearLogsBtn.addEventListener('click', clearLogs);
      
      // Refresh logs every 5 seconds
      setInterval(fetchLogs, 5000);
    });
    
    // Fetch posts
    async function fetchPosts() {
      try {
        const response = await fetch('/api/posts');
        const posts = await response.json();
        renderPosts(posts);
        
        if (posts.length > 0 && !currentPostId) {
          currentPostId = posts[0].postId;
          loadPostDetails(currentPostId);
        }
      } catch (error) {
        console.error('Error fetching posts:', error);
        addLog(`❌ Failed to fetch posts: ${error.message}`, 'error');
      }
    }
    
    // Render posts
    function renderPosts(posts) {
      postsContainer.innerHTML = '';
      
      posts.forEach(post => {
        const postElement = document.createElement('div');
        postElement.className = 'sideDetails';
        postElement.dataset.id = post.postId;
        postElement.innerHTML = `
          <p>${post.postId}</p>
          <p>${post.caption || 'No caption'}</p>
          <p>${new Date(post.timestamp).toLocaleString()}</p>
        `;
        
        postElement.addEventListener('click', () => {
          document.querySelectorAll('.sideDetails').forEach(el => el.classList.remove('active'));
          postElement.classList.add('active');
          currentPostId = post.postId;
          loadPostDetails(post.postId);
        });
        
        postsContainer.appendChild(postElement);
      });
      
      // Activate first post by default
      if (posts.length > 0) {
        document.querySelector('.sideDetails')?.classList.add('active');
      }
    }
    
    // Load post details
    async function loadPostDetails(postId) {
      try {
        const response = await fetch(`/api/posts/${postId}`);
        const { currentSettings, ...post } = await response.json();
        
        postIdSpan.textContent = post.postId;
        postCaptionSpan.textContent = post.caption || 'No caption';
        postTimestampSpan.textContent = new Date(post.timestamp).toLocaleString();
        
        // Update current settings display
        currentKeywordSpan.textContent = currentSettings.keyword || 'none';
        currentMessageSpan.textContent = currentSettings.messageTemplate || 'none';
        keywordInput.value = currentSettings.keyword || '';
        messageInput.value = currentSettings.messageTemplate || '';
        
        renderComments(post.comments || []);
      } catch (error) {
        console.error('Error loading post details:', error);
        addLog(`❌ Failed to load post details: ${error.message}`, 'error');
      }
    }
    
    // Render comments
    function renderComments(comments) {
      commentsTable.innerHTML = '';
      
      if (comments.length === 0) {
        commentsTable.innerHTML = '<tr><td colspan="4">No comments found</td></tr>';
        return;
      }
      
      comments.forEach(comment => {
        const row = document.createElement('tr');
        const statusClass = `status-${comment.dmStatus || 'pending'}`;
        
        row.innerHTML = `
          <td>${comment.username || 'Unknown'}</td>
          <td>${comment.text}</td>
          <td class="${statusClass}">${(comment.dmStatus || 'pending').toUpperCase()}</td>
          <td>
            ${comment.dmStatus === 'failed' ? 
              `<button class="retryBtn" data-comment-id="${comment.commentId}">Retry</button>` : ''}
          </td>
        `;
        
        commentsTable.appendChild(row);
      });
      
      // Add event listeners to retry buttons
      document.querySelectorAll('.retryBtn').forEach(btn => {
        btn.addEventListener('click', () => {
          const commentId = btn.dataset.commentId;
          retryDM(commentId);
        });
      });
    }
    
    // Search posts
    function searchPosts() {
      const searchTerm = searchBar.value.toLowerCase();
      const postElements = document.querySelectorAll('.sideDetails');
      
      postElements.forEach(post => {
        const caption = post.querySelector('p:nth-child(2)').textContent.toLowerCase();
        post.style.display = caption.includes(searchTerm) ? 'block' : 'none';
      });
    }
    
    // Update settings (keyword and message)
    async function updateSettings() {
      const keyword = keywordInput.value.trim();
      const messageTemplate = messageInput.value.trim();
      
      if (!currentPostId) return alert('No post selected');
      
      try {
        const response = await fetch('/api/update-settings', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            postId: currentPostId,
            keyword: keyword || 'none',
            messageTemplate: messageTemplate || 'none'
          })
        });
        
        const result = await response.json();
        if (result.success) {
          currentKeywordSpan.textContent = keyword || 'none';
          currentMessageSpan.textContent = messageTemplate || 'none';
          addLog(`✅ Updated settings for post ${currentPostId}`);
          loadPostDetails(currentPostId); // Refresh to show changes
        } else {
          addLog(`❌ Failed to update settings: ${result.message}`, 'error');
        }
      } catch (error) {
        console.error('Error updating settings:', error);
        addLog(`❌ Failed to update settings: ${error.message}`, 'error');
      }
    }
    
    // Retry failed DM
    async function retryDM(commentId) {
      if (!currentPostId) return;
      
      try {
        const response = await fetch('/api/retry-dm', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            postId: currentPostId,
            commentId
          })
        });
        
        const result = await response.json();
        if (result.success) {
          addLog(`🔄 Retrying DM for comment ${commentId}`);
          loadPostDetails(currentPostId); // Refresh comments
        } else {
          addLog(`❌ Failed to retry DM: ${result.message}`, 'error');
        }
      } catch (error) {
        console.error('Error retrying DM:', error);
        addLog(`❌ Failed to retry DM: ${error.message}`, 'error');
      }
    }
    
    // Refresh comments
    async function refreshComments() {
      if (!currentPostId) return;
      
      try {
        const response = await fetch('/api/refresh-comments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            postId: currentPostId
          })
        });
        
        const result = await response.json();
        if (result.success) {
          addLog(`🔄 Refreshed comments for post ${currentPostId}. Found ${result.newComments} new comments`);
          loadPostDetails(currentPostId); // Refresh comments
        } else {
          addLog(`❌ Failed to refresh comments: ${result.message}`, 'error');
        }
      } catch (error) {
        console.error('Error refreshing comments:', error);
        addLog(`❌ Failed to refresh comments: ${error.message}`, 'error');
      }
    }
    
    // Refresh all posts
    async function refreshAllPosts() {
      try {
        addLog('⏳ Manually refreshing all posts...');
        await fetch('/api/refresh-comments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            postId: 'all' // Special value to refresh all
          })
        });
        fetchPosts();
      } catch (error) {
        console.error('Error refreshing posts:', error);
        addLog(`❌ Failed to refresh posts: ${error.message}`, 'error');
      }
    }
    
    // Fetch logs
    async function fetchLogs() {
      try {
        const response = await fetch('/api/logs');
        const logs = await response.json();
        renderLogs(logs);
      } catch (error) {
        console.error('Error fetching logs:', error);
      }
    }
    
    // Render logs
    function renderLogs(logs) {
      logsContainer.innerHTML = '';
      
      logs.forEach(log => {
        const logElement = document.createElement('div');
        logElement.className = `logEntry ${log.type || 'info'}`;
        logElement.innerHTML = `
          <span class="logTimestamp">[${new Date(log.timestamp).toLocaleTimeString()}]</span>
          ${log.message}
        `;
        logsContainer.appendChild(logElement);
      });
    }
    
    // Clear logs
    async function clearLogs() {
      try {
        await fetch('/api/logs/clear');
        fetchLogs();
        addLog('🧹 Cleared all logs');
      } catch (error) {
        console.error('Error clearing logs:', error);
      }
    }
    
    // Helper to add log to UI immediately
    function addLog(message, type = 'info') {
      const logElement = document.createElement('div');
      logElement.className = `logEntry ${type}`;
      logElement.innerHTML = `
        <span class="logTimestamp">[${new Date().toLocaleTimeString()}]</span>
        ${message}
      `;
      logsContainer.insertBefore(logElement, logsContainer.firstChild);
    }
  </script>
</body>
</html>
